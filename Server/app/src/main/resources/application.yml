##### Logging Configuration ####
#logging:
#  level:
#    org.springframework.security: DEBUG
debug: false

#### Server ####
server:
  port: 8000

#### Spring config #####
spring:
  application:
    name: NewsServer
  jpa:
    datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    generate-ddl: true
    hibernate:
      ddl-auto: update

#### Health check ####
managament:
  endpoints:
    web:
      base-path: /actuator
      exposure.include: health
